packages:
  - "apps/web"
  - "packages/ui"

allowBuilds:
  esbuild: true
  msw: false
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
minimumReleaseAgeExclude:
  - shadcn@4.11.1
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
