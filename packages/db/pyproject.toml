[project]
name = "azubot-db"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = ["sqlmodel", "psycopg[binary]", "pydantic-settings", "alembic"]

[tool.uv]
package = true

[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["azubot_db*"]
